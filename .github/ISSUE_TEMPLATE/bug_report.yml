name: 不具合報告
description: Jump Analyzerの再現可能な不具合を記録します
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "動画、UID、メールアドレス、秘密情報は添付しないでください。"
  - type: textarea
    id: summary
    attributes:
      label: 発生した問題
      description: 期待した結果と実際の結果を記載してください。
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      placeholder: "1. 解析画面を開く\n2. 動画を選択する\n3. ..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 環境
      description: OS、ブラウザ、PWAか通常タブかを記載してください。
    validations:
      required: true
  - type: input
    id: video_condition
    attributes:
      label: 動画条件
      description: 動画を添付せず、fps、解像度、撮影方向、明るさだけを記載してください。
  - type: textarea
    id: console
    attributes:
      label: コンソールエラー
      description: 個人情報や秘密情報を除去して貼り付けてください。
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: 確認
      options:
        - label: 個人情報、動画、認証情報を含めていません
          required: true
